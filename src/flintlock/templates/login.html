<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flintlock — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .login-logo-icon {
      width: 36px;
      height: 36px;
      background: #f97316;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .login-logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.4rem;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 0.9375rem;
      font-family: "SF Mono", "Fira Code", monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #f97316;
    }

    .error-msg {
      margin-top: 0.75rem;
      padding: 0.625rem 0.875rem;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 6px;
      color: #fca5a5;
      font-size: 0.8125rem;
    }

    button[type="submit"] {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.7rem 1rem;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #ea6c0a;
    }

    .login-footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🔥</div>
      <span class="login-logo-text">Flintlock</span>
    </div>

    <h1>Sign in</h1>
    <p class="login-subtitle">Enter your API key to access the dashboard.</p>

    <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') | urlencode }}{% endif %}">
      <label for="api_key">API Key</label>
      <input type="password" id="api_key" name="api_key"
             placeholder="Paste your API key here"
             autocomplete="current-password"
             autofocus required />

      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}

      <button type="submit">Sign in</button>
    </form>

    <p class="login-footer">
      API keys are managed in Settings → Security → Access Control.
    </p>
  </div>
</body>
</html>
